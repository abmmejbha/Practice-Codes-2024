<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(20, 72, 85);
            
        }
        form{
            color: rgb(205, 198, 211);
        }
        h2{
            color: rgb(12, 212, 212);
        }
    </style>
</head>
<body>
    <h2>Registration form</h2>
    <form action="" method="post">

        <div>
             <label for="fullname" required>Full Name: </label>
             <input type="text" name="fullname" id="fullname">
        </div><br>
        <div>
             <label for="email">Email: </label>
             <input type="text" name="email" id="email">
        </div><br>
        <div>
             <label for="password">Password: </label>
             <input type="text" name="password" id="password">
        </div><br>
        <div>
             <label for="password">Date of Birth: </label>
             <input type="date" name="dob" id="dob">
        </div><br>
        <div>
             <label for="password">Choose your photo: </label>
             <input type="file" name="photo" id="photo">
        </div><br>
        <div>
             <label for="gender">Gender: </label>
             <input checked type="radio" name="gender" id="gender" value="male">Male
             <input type="radio" name="gender" id="gender" value="female">Female
        </div><br>
        <div>
             <label for="password">Religion: </label>
             <input checked type="checkbox" name="c1" id="muslim" value="islam">Islam
             <input type="checkbox" name="c1" id="hindu" value="hindu">Hindu
        </div><br>

        <div>
            <label for="department">Department</label>
            <select name="department" id="">
                <option value="cse">CSE</option>
                <option value="eee" >EEE</option>
                <option value="llb">LLB</option>
            </select>
        </div><br>

        <div>
            <label for="message">Message:</label>
            <textarea name="message" id="message" cols="40" rows="5"></textarea>
        </div>

        <div>
            <input type="submit" Register><br>
            <input type="reset" value="Clear">
        </div>

        <div>
            <iframe src="https://mbasic.facebook.com/suweet.ka" height="350px" width="500px"></iframe>
        </div>
    </form>

</body>
</html>
