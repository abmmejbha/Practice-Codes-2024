<!DOCTYPE html>
<html lang="en">
<head>
  <style>
     *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
     }
     body {
        height: 100vh;
        background-color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
     }
    .img-container {
        position: relative;
        height: 250px;
        width: 250px;
        perspective: 500px;
        transform-style: preserve-3d;
    }
    .box {
        box-shadow: 0 0 10px rgb(0 0 0 / 30%);
        width: 250px;
        height: 250px;
        border-radius: 25px;
        overflow: hidden;
        border: 1px solid #bbb;
        position: absolute;
        top: 50%;
        transition: 800ms ease-in-out;
    }
    .box img {
        width: 100%;
        height: 100%;
    }
    .box:first-of-type {
        z-index: 5;
        opacity: 0;
        left: 15%;
        transform: (-15%, -50%) rotateY(-10deg);
    }
    .box:nth-of-type(2) {
        opacity: 1;
        left: 20%;
        transform: translate(-50%, -50%) rotateY(-10deg);
        z-index: 5;
    }
    .box:nth-of-type(3) {
        left: 25%;
        opacity: 0.75;
        color: #eee;
        z-index: 10;
        transform: translate(-50%, -50%) rotateY(-10deg) translateZ(-50px);
    }
    .box:nth-of-type(4) {
        z-index: 5;
        opacity: 0,5;
        left: 30%;
        transform: translate(-50%, -50) rotateY(-10deg) translateZ(-100px);

    }
  </style>
</head>
<body>
    <div class="=img-container">
        <div class="box"> 
            <img src="https://img.freepik.com/free-photo/wide-angle-
            shot-single-tree-growing-clouded-sky-during-sunset-surrounded-by-grass
            _181624-22807.jpg?w=740&=st=1692617800~exp=1692618400~hmac=da967fd7227c
            7a9ad38cd8a070b995acb4f4bb6c2185c6a20bd2e90c6eabf6ab"
            alt=""/>
        </div>
    </div>
    <div class="box">
        <img src="https://img.freepik.com/free-photo/wide-angle-
        shot-single-tree-growing-clouded-sky-during-sunset-surrounded-by-grass
        _181624-22807.jpg?w=740&=st=1692617800~exp=1692618400~hmac=da967fd7227c
        7a9ad38cd8a070b995acb4f4bb6c2185c6a20bd2e90c6eabf6ab"
        alt=""/>
    </div>
    <div class="box">
        <img src="https://img.freepik.com/free-photo/wide-angle-
        shot-single-tree-growing-clouded-sky-during-sunset-surrounded-by-grass
        _181624-22807.jpg?w=740&=st=1692617800~exp=1692618400~hmac=da967fd7227c
        7a9ad38cd8a070b995acb4f4bb6c2185c6a20bd2e90c6eabf6ab"
        alt=""/>
    </div>
    <div class="box">
        <img src="https://img.freepik.com/free-photo/wide-angle-
        shot-single-tree-growing-clouded-sky-during-sunset-surrounded-by-grass
        _181624-22807.jpg?w=740&=st=1692617800~exp=1692618400~hmac=da967fd7227c
        7a9ad38cd8a070b995acb4f4bb6c2185c6a20bd2e90c6eabf6ab"
        alt=""/>
    </div>
    <script>
        let imgContainer = document.querySelector("img-container");
        setInterval(() => {
            let last = imgContainer.firstElementChild;
            last.remove();
            imgContainer.appendChild(last);
        }, 250)
    </script>

    
</body>
</html>
